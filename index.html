document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;background:radial-gradient(120% 90% at 50% 0%, #25221c 0%, #18160f 55%, #0f0e0a 100%);font-family:'Hanken Grotesque',sans-serif;\">\n  <div data-app-phone=\"\" style=\"width:390px;height:844px;background:#121009;border-radius:48px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);box-shadow:0 50px 90px -30px rgba(0,0,0,.8), 0 0 0 11px #1c1a14, 0 0 0 12px #2c2920;display:flex;flex-direction:column;\">\n\n    <!-- status bar -->\n    <div data-statusbar=\"\" style=\"flex:none;height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 8px;color:#f4f1e9;z-index:5;\">\n      <div style=\"font:700 15px 'Hanken Grotesque';letter-spacing:.02em;\">{{ clock }}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px;\">\n        <svg width=\"18\" height=\"12\" viewBox=\"0 0 18 12\" fill=\"currentColor\"><rect x=\"0\" y=\"8\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"5\" y=\"5\" width=\"3\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"10\" y=\"2.5\" width=\"3\" height=\"9.5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"0\" width=\"3\" height=\"12\" rx=\"1\"><\u002Frect><\u002Fsvg>\n        <svg width=\"17\" height=\"12\" viewBox=\"0 0 17 13\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M1 4.5C3.2 2.5 5.9 1.4 8.5 1.4S13.8 2.5 16 4.5\"><\u002Fpath><path d=\"M3.7 7.4C5.1 6.2 6.8 5.6 8.5 5.6s3.4.6 4.8 1.8\"><\u002Fpath><path d=\"M6.3 10.2c.6-.6 1.4-.9 2.2-.9s1.6.3 2.2.9\"><\u002Fpath><\u002Fsvg>\n        <div style=\"display:flex;align-items:center;gap:2px;\"><div style=\"width:23px;height:12px;border:1.5px solid rgba(244,241,233,.5);border-radius:3px;padding:1.5px;\"><div style=\"width:100%;height:100%;background:#f4f1e9;border-radius:1px;\"><\u002Fdiv><\u002Fdiv><div style=\"width:1.5px;height:4px;background:rgba(244,241,233,.5);border-radius:0 1px 1px 0;\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SCREEN AREA -->\n    <div data-scroll=\"\" style=\"flex:1;overflow-y:auto;position:relative;\">\n\n      <!-- ============ HOME ============ -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:4px 20px 28px;animation:hb-fade .34s ease;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 0 20px;\">\n          <div onclick=\"{{ onEditName }}\" style=\"cursor:pointer;min-width:0;\">\n            <div style=\"font:600 13px 'Hanken Grotesque';color:#8c877b;letter-spacing:.02em;\">{{ todayLabel }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;margin-top:3px;\">\n              <span style=\"font:800 25px 'Archivo';color:#f4f1e9;letter-spacing:-.01em;\">{{ greeting }}, {{ name }}<\u002Fspan>\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6f6a5f\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ onEditName }}\" style=\"width:44px;height:44px;border-radius:50%;background:linear-gradient(140deg,#2b2920,#1a1812);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font:700 15px 'Archivo';color:#d8fa4e;cursor:pointer;flex:none;\">{{ initials }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- streak hero -->\n        <div style=\"background:#1a1811;border:1px solid rgba(255,255,255,.07);border-radius:26px;padding:22px;margin-bottom:16px;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;\">\n            <div>\n              <div style=\"font:600 11px 'Hanken Grotesque';color:#8c877b;letter-spacing:.1em;text-transform:uppercase;\">Current streak<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:9px;margin-top:6px;\">\n                <span style=\"font:900 48px 'Archivo';color:#d8fa4e;line-height:.9;letter-spacing:-.02em;\">{{ streak }}<\u002Fspan>\n                <span style=\"font:600 16px 'Hanken Grotesque';color:#c9c5ba;\">days<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:46px;height:46px;border-radius:14px;background:rgba(216,250,78,.12);display:flex;align-items:center;justify-content:center;color:#d8fa4e;animation:hb-pulse 2.4s ease-in-out infinite;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:7px;margin-top:20px;\">\n            <sc-for list=\"{{ weekDots }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;\">\n                <div style=\"width:100%;height:7px;border-radius:99px;{{ d.bar }}\"><\u002Fdiv>\n                <span style=\"font:600 11px 'Hanken Grotesque';color:#6f6a5f;\">{{ d.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- today's pick -->\n        <div style=\"font:700 12px 'Hanken Grotesque';color:#8c877b;letter-spacing:.1em;text-transform:uppercase;margin:6px 2px 12px;\">Today's pick<\u002Fdiv>\n        <div onclick=\"{{ openToday }}\" style=\"position:relative;border-radius:26px;overflow:hidden;margin-bottom:22px;cursor:pointer;border:1px solid rgba(255,255,255,.07);\">\n          <div style=\"height:190px;background:repeating-linear-gradient(125deg,#34301f 0px,#34301f 11px,#2a2719 spacing:.1em;text-transform:uppercase;\">Quick start<\u002Fdiv>\n          <div onclick=\"{{ goTrain }}\" style=\"font:600 13px 'Hanken Grotesque';color:#d8fa4e;cursor:pointer;\">See all<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <sc-for list=\"{{ quickPicks }}\" as=\"w\" hint-placeholder-count=\"2\">\n            <div onclick=\"{{ w.onOpen }}\" style=\"display:flex;align-items:center;gap:14px;background:#1a1811;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:11px;cursor:pointer;\">\n              <div style=\"width:62px;height:62px;border-radius:15px;flex:none;background:repeating-linear-gradient(125deg,#34301f 0px,#34301f 8px,#2a2719 8px,#2a2719 16px);\"><\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font:700 16px 'Archivo';color:#f4f1e9;\">{{ w.title }}<\u002Fdiv>\n                <div style=\"font:500 13px 'Hanken Grotesque';color:#8c877b;margin-top:3px;\">{{ w.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:34px;height:34px;border-radius:50%;background:rgba(216,250,78,.12);display:flex;align-items:center;justify-content:center;color:#d8fa4e;flex:none;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 4v16l13-8z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ TRAIN ============ -->\n      <sc-if value=\"{{ isTrain }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:4px 20px 28px;animation:hb-fade .34s ease;\">\n        <div style=\"padding:10px 0 16px;\">\n          <div style=\"font:800 28px 'Archivo';color:#f4f1e9;letter-spacing:-.01em;\">Workouts<\u002Fdiv>\n          <div style=\"font:500 14px 'Hanken Grotesque';color:#8c877b;margin-top:2px;\">Bodyweight only · no equipment<\u00 :600 10px 'Hanken Grotesque';\">Home<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goTrain }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:{{ navTrain }};\">\n        <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 8L9 4l-3 8H2\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font:600 10px 'Hanken Grotesque';\">Train<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goProgress }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:{{ navProgress }};\">\n        <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"6\" y1=\"20\" x2=\"6\" y2=\"14\"><\u002Fline><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"4\"><\u002Fline><line x1=\"18\" y1=\"20\" x2=\"18\" y2=\"10\"><\u002Fline><\u002Fsvg>\n        <span style=\"font:600 10px 'Hanken Grotesque';\">Progress<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goBuild }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:{{ navBuild }};\">\n        <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v8M8 12h8\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font:600 10px 'Hanken Grotesque';\">Build<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ DETAIL OVERLAY ============ -->\n    <sc-if value=\"{{ hasDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:#121009;z-index:20;display:flex;flex-direction:column;animation:hb-rise .3s ease;\">\n      <div data-scroll=\"\" style=\"flex:1;overflow-y:auto;\">\n        <div style=\"position:relative;height:300px;\">\n          <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(125deg,#34301f 0px,#34301f 12px,#2a2719 12px,#2a2719 24px);\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,14,9,.55) 0%,rgba(15,14,9,.1) 30%,rgba(18,16,9,.96) 100%);\"><\u002Fdiv>\n          <div style=\"position:absolute;top:14px;left:16px;right:16px;display:flex;align-items:center;justify-content:space-between;\">\n            <div onclick=\"{{ detail.onBack }}\" style=\"width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:#f4f1e9;cursor:pointer;\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m15 18-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font:600 10px 'Hanken Grotesque';color:#8c877b;letter-spacing:.12em;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);padding:6px 11px;border-radius:99px;\">{{ detail.focusUpper }}.JPG<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:22px;right:22px;bottom:20px;\">\n            <div style=\"display:flex;gap:7px;margin-bottom:10px;\">\n              <span style=\"font:700 11px 'Hanken Grotesque';color:#d8fa4e;background:rgba(216,250,78,.16);padding:5px 11px;border-radius:99px;\">{{ detail.focus }}<\u002Fspan>\n              <span style=\"font:600 11px 'Hanken Grotesque';color:#d6d2c7;background:rgba(255,255,255,.1);padding:5px 11px;border-radius:99px;\">{{ detail.level }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font:800 30px 'Archivo';color:#f7f4ec;letter-spacing:-.02em;\">{{ detail.title }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:6px 22px 120px;\">\n          <div style=\"font:500 15px 'Hanken Grotesque';color:#b4b0a4;line-height:1.55;margin-bottom:20px;\">{{ detail.desc }}<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;margin-bottom:26px;\">\n            <div style=\"flex:1;background:#1a1811;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:13px;text-align:center;\">\n              <div style=\"font:800 19px 'Archivo';color:#f4f1e9;\">{{ detail.mins }}<\u002Fdiv>\n              <div style=\"font:500 11px 'Hanken Grotesque';color:#8c877b;margin-top:2px;\">minutes<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#1a1811;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:13px;text-align:center;\">\n              <div style=\"font:800 19px 'Archivo';color:#f4f1e9;\">{{ detail.count }}<\u002Fdiv>\n              <div style=\"font:500 11px 'Hanken Grotesque';color:#8c877b;margin-top:2px;\">exercises<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#1a1811;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:13px;text-align:center;\">\n              <div style=\"font:800 19px 'Archivo';color:#f4f1e9;\">{{ detail.kcal }}<\u002Fdiv>\n              <div style=\"font:500 11px 'Hanken Grotesque';color:#8c877b;margin-top:2px;\">kcal<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"font:700 12px 'Hanken Grotesque';color:#8c877b;letter-spacing:.1em;text-transform:uppercase;margin:0 2px 14px;\">The circuit<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ detail.exercises }}\" as=\"e\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;gap:14px;background:#1a1811;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:11px;\">\n                <div style=\"width:52px;height:52px;border-radius:13px;flex:none;background:repeating-linear-gradient(125deg,#34301f 0px,#34301f 7px,#2a2719 7px,#2a2719 14px);\"><\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font:700 16px 'Archivo';color:#f4f1e9;\">{{ e.name }}<\u002Fdiv>\n                  <div style=\"font:500 12px 'Hanken Grotesque';color:#8c877b;margin-top:2px;\">{{ e.spec }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ e.onWatch }}\" style=\"display:flex;align-items:center;gap:6px;flex:none;background:rgba(216,250,78,.12);border:1px solid rgba(216,250,78,.22);border-radius:99px;padding:8px 12px;font:700 12px 'Hanken Grotesque';color:#d8fa4e;cursor:pointer;\">\n                  <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 4v16l13-8z\"><\u002Fpath><\u002Fsvg>\n                  Watch\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;right:0;bottom:0;padding:16px 22px 30px;background:linear-gradient(180deg,rgba(18,16,9,0),#100e08 32%);\">\n        <button onclick=\"{{ detail.onStart }}\" style=\"width:100%;background:#d8fa4e;border:none;border-radius:18px;padding:18px;font:800 17px 'Archivo';color:#13110a;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 12px 28px -10px rgba(216,250,78,.5);\">\n          <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 4v16l13-8z\"><\u002Fpath><\u002Fsvg>\n          Start workout\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ PLAYER OVERLAY ============ -->\n    <sc-if value=\"{{ isPlaying }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 0%,#242014 0%,#13110a 60%);z-index:30;display:flex;flex-direction:column;animation:hb-fade .26s ease;\">\n      <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;\">\n        <div onclick=\"{{ player.onExit }}\" style=\"width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:#f4f1e9;cursor:pointer;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font:700 14px 'Archivo';color:#f4f1e9;\">{{ player.title }}<\u002Fdiv>\n          <div style=\"font:600 11px 'Hanken Grotesque';color:#8c877b;letter-spacing:.04em;\">EXERCISE {{ player.pos }} OF {{ player.count }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:42px;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 30px;\">\n        <div style=\"width:248px;height:248px;border-radius:50%;background:{{ player.ring }};display:flex;align-items:center;justify-content:center;margin-bottom:30px;\">\n          <div style=\"width:212px;height:212px;border-radius:50%;background:#15130c;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px;text-align:center;\">\n            <div style=\"font:600 11px 'Hanken Grotesque';color:#8c877b;letter-spacing:.14em;\">YOUR TARGET<\u002Fdiv>\n            <div style=\"font:900 34px 'Archivo';color:#f4f1e9;line-height:1.05;letter-spacing:-.01em;margin-top:8px;\">{{ player.spec }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:800 30px 'Archivo';color:#f7f4ec;letter-spacing:-.01em;text-align:center;\">{{ player.exName }}<\u002Fdiv>\n        <div onclick=\"{{ player.onWatch }}\" style=\"display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:rgba(216,250,78,.12);border:1px solid rgba(216,250,78,.22);border-radius:99px;padding:9px 16px;font:700 13px 'Hanken Grotesque';color:#d8fa4e;cursor:pointer;\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 4v16l13-8z\"><\u002Fpath><\u002Fsvg>\n          How to do it\n        <\u002Fdiv>\n        <div style=\"font:500 14px 'Hanken Grotesque';color:#8c877b;margin-top:16px;\">Next · {{ player.nextName }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:none;display:flex;align-items:center;justify-content:center;gap:26px;padding:0 30px 16px;\">\n        <div onclick=\"{{ player.onPrev }}\" style=\"width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:#d6d2c7;cursor:pointer;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M11 19V5l-9 7zM22 19V5l-9 7z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div onclick=\"{{ player.onNext }}\" style=\"width:86px;height:86px;border-radius:50%;background:#d8fa4e;display:flex;align-items:center;justify-content:center;color:#13110a;cursor:pointer;box-shadow:0 14px 34px -10px rgba(216,250,78,.55);\">\n          <sc-if value=\"{{ player.notLast }}\" hint-placeholder-val=\"{{ true }}\">\n            <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m9 18 6-6-6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ player.isLast }}\" hint-placeholder-val=\"{{ false }}\">\n            <svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ player.onNext }}\" style=\"width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:#d6d2c7;cursor:pointer;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 5v14l9-7zM2 5v14l9-7z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:flex;justify-content:center;padding:0 30px 40px;\">\n        <div onclick=\"{{ player.onFinish }}\" style=\"display:inline-flex;align-items:center;gap:8px;font:700 13px 'Hanken Grotesque';color:#8c877b;cursor:pointer;padding:8px 14px;\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          Finish &amp; log workout\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ VIDEO MODAL ============ -->\n    <sc-if value=\"{{ hasVideo }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ video.onClose }}\" style=\"position:absolute;inset:0;background:rgba(8,7,4,.86);backdrop-filter:blur(8px);z-index:40;display:flex;flex-direction:column;justify-content:center;padding:18px;animation:hb-fade .22s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#1a1811;border:1px solid rgba(255,255,255,.09);border-radius:24px;overflow:hidden;box-shadow:0 30px 70px -20px rgba(0,0,0,.8);\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 16px 13px;\">\n          <div style=\"min-width:0;\">\n            <div style=\"font:600 10px 'Hanken Grotesque';color:#8c877b;letter-spacing:.12em;text-transform:uppercase;\">How to do<\u002Fdiv>\n            <div style=\"font:800 18px 'Archivo';color:#f4f1e9;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ video.name }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ video.onClose }}\" style=\"width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#f4f1e9;cursor:pointer;flex:none;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ video.verified }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:relative;width:100%;aspect-ratio:16/9;background:#000;\">\n          <iframe src=\"{{ video.embedSrc }}\" allow=\"autoplay; encrypted-media; picture-in-picture; fullscreen\" allowfullscreen=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0;\"><\u002Fiframe>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ video.notVerified }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative;width:100%;aspect-ratio:16/9;background:repeating-linear-gradient(125deg,#221f15 0px,#221f15 11px,#1c1a12 11px,#1c1a12 22px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;\">\n          <div style=\"width:54px;height:54px;border-radius:16px;background:rgba(216,250,78,.12);display:flex;align-items:center;justify-content:center;color:#d8fa4e;\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"M9 13h6M9 17h4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font:700 13px 'Hanken Grotesque';color:#b4b0a4;\">Form guide<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"padding:15px 17px 4px;\">\n          <div style=\"font:600 10px 'Hanken Grotesque';color:#8c877b;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;\">How to do it<\u002Fdiv>\n          <div style=\"font:500 14px 'Hanken Grotesque';color:#d6d2c7;line-height:1.55;\">{{ video.cue }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ video.onOpenSearch }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;margin:14px;padding:13px;background:rgba(216,250,78,.1);border:1px solid rgba(216,250,78,.2);border-radius:14px;font:700 13px 'Hanken Grotesque';color:#d8fa4e;cursor:pointer;\">\n          Watch demos on YouTube\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7M7 7h10v10\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'home',\n    detailId: null,\n    playing: false,\n    playerIdx: 0,\n    filter: 'All',\n    routineName: 'My Core Circuit',\n    selected: ['Plank', 'Push-Up', 'Squat', 'Leg Raise'],\n    videoEx: null,\n    name: 'Athlete',\n    log: [],   // completed workouts: [{id,title,mins,ts}]\n  };\n\n  // ---- live system clock for the status bar ----\n  clockTick(){\n    const d = new Date();\n    let h = d.getHours() % 12; if (h === 0) h = 12;\n    this.setState({ clock: `${h}:${String(d.getMinutes()).padStart(2,'0')}` });\n  }\n  componentWillUnmount(){ if (this._clockTimer) clearInterval(this._clockTimer); }\n\n  // ---- persistence (saved on this device) ----\n  componentDidMount(){\n    this.clockTick();\n    this._clockTimer = setInterval(() => this.clockTick(), 15000);\n    try {\n      const n = localStorage.getItem('homebody.name');\n      const l = localStorage.getItem('homebody.log');\n      const sel = localStorage.getItem('homebody.selected');\n      const rn = localStorage.getItem('homebody.routine');\n      const patch = {};\n      if (n) patch.name = n;\n      if (l) patch.log = JSON.parse(l) || [];\n      if (sel) patch.selected = JSON.parse(sel) || this.state.selected;\n      if (rn) patch.routineName = rn;\n      if (Object.keys(patch).length) this.setState(patch);\n    } catch (e) {}\n  }\n  save(k, v){ try { localStorage.setItem(k, v); } catch (e) {} }\n\n  editName(){\n    const v = window.prompt('Enter your name', this.state.name);\n    if (v != null) { const name = v.trim() || 'Athlete'; this.setState({ name }); this.save('homebody.name', name); }\n  }\n  setSelected(arr){ this.setState({ selected: arr }); this.save('homebody.selected', JSON.stringify(arr)); }\n  finishWorkout(w){\n    const entry = { id: w.id, title: w.title, mins: w.mins, ts: Date.now() };\n    const log = [entry, ...(this.state.log || [])];\n    this.setState({ log, playing: false, detailId: null, playerIdx: 0, tab: 'progress' });\n    this.save('homebody.log', JSON.stringify(log));\n  }\n\n  // Verified embeddable demo videos (embedding enabled — confirmed playable in-app).\n  videos = {\n    'Plank': 'mwlp75MS6Rg',\n    'Push-Up': 'WDIpL0pjun0',\n    'Squat': 'DlS-GAF8Edg',\n  };\n\n  // Concise form cues for every exercise — always available, no network needed.\n  cues = {\n    'Plank': 'Forearms under shoulders, body in one straight line from head to heels. Brace your core and squeeze your glutes — don\\u2019t let your hips sag or pike up.',\n    'Crunch': 'Lie on your back, knees bent. Lift your shoulder blades off the floor by contracting your abs, exhale at the top, then lower slowly. Keep your neck relaxed.',\n    'Bicycle Crunch': 'On your back, hands by your ears. Bring opposite elbow toward the opposite knee while extending the other leg. Alternate smoothly — twist from the core, not the neck.',\n    'Leg Raise': 'Lie flat, legs straight, hands under your hips. Raise your legs to vertical, then lower slowly without letting your lower back arch off the floor.',\n    'Russian Twist': 'Sit with knees bent, lean back slightly, lift your feet if you can. Rotate your torso side to side, tapping the floor by each hip. Move with control.',\n    'Mountain Climber': 'Start in a high plank. Drive one knee toward your chest, then switch quickly, keeping your hips low and core tight. Build a steady running rhythm.',\n    'Dead Bug': 'On your back, arms reaching at the ceiling, knees bent at 90\\u00b0. Lower one arm and the opposite leg, keeping your low back pressed to the floor. Alternate.',\n    'Hollow Hold': 'On your back, press your lower back into the floor, then lift your shoulders and legs a few inches. Reach your arms overhead and hold a tight banana shape.',\n    'Side Plank': 'On one forearm, elbow under shoulder, feet stacked. Lift your hips so your body forms a straight line. Hold tall — don\\u2019t let your hips drop.',\n    'V-Up': 'Lie flat, arms overhead. Simultaneously lift your legs and torso, reaching your hands toward your feet to form a V. Lower with control.',\n    'Flutter Kicks': 'On your back, legs straight and slightly raised, low back pressed down. Make small, quick alternating up-and-down kicks while keeping your core braced.',\n    'Squat': 'Feet shoulder-width, toes slightly out. Sit your hips back and down, knees tracking over your toes, chest up. Drive through your heels to stand.',\n    'Push-Up': 'Hands just wider than shoulders, body in a straight line. Lower your chest toward the floor with elbows ~45\\u00b0, then press back up. Keep your core tight.',\n    'Lunge': 'Step forward and lower until both knees are ~90\\u00b0, front knee over your ankle, back knee just above the floor. Push through the front heel to return.',\n    'Glute Bridge': 'On your back, knees bent, feet flat. Drive your hips up by squeezing your glutes until your body is a straight line, pause, then lower slowly.',\n    'Pike Push-Up': 'Start in a downward-dog shape, hips high. Lower the top of your head toward the floor by bending your elbows, then press back up. Targets shoulders.',\n    'Tricep Dip': 'Hands on a sturdy edge behind you, fingers forward. Bend your elbows straight back to lower your hips, then press up. Keep elbows tucked, not flared.',\n    'Wall Sit': 'Back flat against a wall, slide down until thighs are parallel to the floor, knees over ankles. Hold the position and keep breathing.',\n    'Superman': 'Lie face down, arms extended forward. Lift your arms, chest, and legs off the floor by squeezing your back and glutes. Pause, then lower with control.',\n    'Calf Raise': 'Stand tall, feet hip-width. Rise onto the balls of your feet as high as you can, pause at the top, then lower slowly. Add a step edge for more range.',\n    'Diamond Push-Up': 'Hands together under your chest forming a diamond. Lower with elbows tucked close to your sides, then press up. Tougher on the triceps.',\n    'Plank Up-Down': 'From a forearm plank, press up onto one hand, then the other, into a high plank — then back down to forearms. Alternate the leading arm, hips steady.',\n  };\n\n  workouts = [\n    { id:'core-crusher', title:'Core Crusher', focus:'Core', tag:'core', level:'Intermediate', mins:15, count:8, kcal:142, quick:false,\n      desc:'A focused eight-move core circuit that hits every angle — front, sides, and lower abs. No equipment, just control and tempo.',\n      exercises:[['Plank','45 sec hold'],['Bicycle Crunch','40 sec'],['Leg Raise','15 reps'],['Russian Twist','30 sec'],['Mountain Climber','40 sec'],['Dead Bug','12 each side'],['Hollow Hold','30 sec'],['Side Plank','30 sec each']] },\n    { id:'morning', title:'Morning Foundations', focus:'Full Body', tag:'strength', level:'Beginner', mins:10, count:6, kcal:88, quick:true,\n      desc:'An easy full-body wake-up to start the day. Gentle on the joints, builds the habit, gets blood flowing.',\n      exercises:[['Squat','15 reps'],['Push-Up','10 reps'],['Glute Bridge','15 reps'],['Plank','30 sec'],['Lunge','10 each side'],['Superman','12 reps']] },\n    { id:'iron-core', title:'Iron Core', focus:'Core', tag:'core', level:'Advanced', mins:20, count:10, kcal:190, quick:false,\n      desc:'Ten brutal rounds for an unbreakable midsection. Longer holds, higher reps — built for those who already have a base.',\n      exercises:[['Hollow Hold','45 sec'],['V-Up','15 reps'],['Plank','60 sec'],['Russian Twist','40 reps'],['Leg Raise','20 reps'],['Bicycle Crunch','50 sec'],['Flutter Kicks','40 sec'],['Side Plank','45 sec each'],['Mountain Climber','50 sec'],['Dead Bug','16 each side']] },\n    { id:'bw-strength', title:'Bodyweight Strength', focus:'Strength', tag:'strength', level:'Intermediate', mins:25, count:9, kcal:220, quick:false,\n      desc:'Build real strength with nothing but your bodyweight. Compound pushes, squats, and holds that load every major muscle.',\n      exercises:[['Push-Up','15 reps'],['Squat','20 reps'],['Lunge','12 each side'],['Pike Push-Up','10 reps'],['Tricep Dip','12 reps'],['Glute Bridge','20 reps'],['Wall Sit','45 sec'],['Superman','15 reps'],['Calf Raise','25 reps']] },\n    { id:'quick-abs', title:'Quick Abs', focus:'Core', tag:'core', level:'Beginner', mins:8, count:5, kcal:70, quick:true,\n      desc:'Five moves, eight minutes, zero excuses. A fast core finisher you can squeeze in anywhere.',\n      exercises:[['Crunch','20 reps'],['Plank','30 sec'],['Bicycle Crunch','30 sec'],['Leg Raise','12 reps'],['Russian Twist','30 sec']] },\n    { id:'push-power', title:'Push Power', focus:'Strength', tag:'strength', level:'Intermediate', mins:18, count:7, kcal:160, quick:false,\n      desc:'Chest, shoulders, and triceps pushed to fatigue with progressive push-up variations and isometric holds.',\n      exercises:[['Push-Up','12 reps'],['Pike Push-Up','10 reps'],['Tricep Dip','12 reps'],['Diamond Push-Up','8 reps'],['Wall Sit','40 sec'],['Plank Up-Down','10 reps'],['Superman','15 reps']] },\n  ];\n\n  library = [\n    ['Plank','Core'],['Crunch','Core'],['Bicycle Crunch','Core'],['Leg Raise','Core'],\n    ['Russian Twist','Core'],['Mountain Climber','Core'],['Hollow Hold','Core'],['Side Plank','Core'],\n    ['Push-Up','Strength'],['Squat','Strength'],['Lunge','Strength'],['Glute Bridge','Strength'],\n    ['Pike Push-Up','Strength'],['Tricep Dip','Strength'],['Wall Sit','Strength'],['Superman','Strength'],\n  ];\n\n  specFor(name){\n    const map = { 'Plank':'45 sec','Crunch':'20 reps','Bicycle Crunch':'40 sec','Leg Raise':'15 reps','Russian Twist':'30 sec','Mountain Climber':'40 sec','Hollow Hold':'30 sec','Side Plank':'30 sec each','Push-Up':'12 reps','Squat':'15 reps','Lunge':'10 each side','Glute Bridge':'15 reps','Pike Push-Up':'10 reps','Tricep Dip':'12 reps','Wall Sit':'45 sec','Superman':'12 reps' };\n    return map[name] || '3 × 12';\n  }\n\n  renderVals(){\n    const s = this.state;\n    const A = '#d8fa4e';\n    const set = (o) => this.setState(o);\n\n    // nav\n    const nc = (k) => s.tab === k && !s.detailId && !s.playing ? A : '#6f6a5f';\n\n    // filter chips\n    const chipBase = \"padding:9px 17px;border-radius:999px;font:600 13px 'Hanken Grotesque';cursor:pointer;white-space:nowrap;flex:none;\";\n    const chips = ['All','Core','Strength','Quick'].map(c => ({\n      label: c,\n      onClick: () => set({ filter: c }),\n      style: chipBase + (c === s.filter\n        ? 'background:#d8fa4e;color:#13110a;border:1px solid #d8fa4e;'\n        : 'background:#1a1811;color:#9b968b;border:1px solid rgba(255,255,255,.08);'),\n    }));\n\n    // workout list (filtered)\n    let list = this.workouts;\n    if (s.filter === 'Core') list = list.filter(w => w.tag === 'core');\n    else if (s.filter === 'Strength') list = list.filter(w => w.tag === 'strength');\n    else if (s.filter === 'Quick') list = list.filter(w => w.quick);\n    const workoutCards = list.map(w => ({ ...w, onOpen: () => set({ detailId: w.id }) }));\n\n    // quick picks (home)\n    const quickPicks = this.workouts.filter(w => w.quick).map(w => ({\n      title: w.title, meta: `${w.mins} min · ${w.focus}`, onOpen: () => set({ detailId: w.id }),\n    }));\n\n    // detail\n    const d = this.workouts.find(w => w.id === s.detailId);\n    const detail = d ? {\n      ...d,\n      focusUpper: d.focus.toUpperCase().replace(' ',''),\n      onBack: () => set({ detailId: null }),\n      onStart: () => set({ playing: true, playerIdx: 0 }),\n      exercises: d.exercises.map((e,i) => ({ name:e[0], spec:e[1], idx:String(i+1).padStart(2,'0'), onWatch:(ev)=>{ if(ev&&ev.stopPropagation)ev.stopPropagation(); this.setState({ videoEx:e[0] }); } })),\n    } : null;\n\n    // player\n    const pd = d || this.workouts[0];\n    const pIdx = Math.min(s.playerIdx || 0, pd.exercises.length - 1);\n    const cur = pd.exercises[pIdx];\n    const isLast = pIdx >= pd.exercises.length - 1;\n    const prog = Math.round((pIdx / pd.exercises.length) * 100);\n    const player = {\n      title: pd.title,\n      pos: pIdx + 1, count: pd.exercises.length,\n      exName: cur[0], spec: cur[1],\n      nextName: isLast ? 'Finish & log it' : pd.exercises[pIdx + 1][0],\n      isLast, notLast: !isLast,\n      ring: `conic-gradient(#d8fa4e 0% ${prog}%, rgba(255,255,255,.08) ${prog}% 100%)`,\n      onWatch: () => this.setState({ videoEx: cur[0] }),\n      onPrev: () => this.setState(st => ({ playerIdx: Math.max(0, (st.playerIdx || 0) - 1) })),\n      onNext: () => { if (isLast) this.finishWorkout(pd); else this.setState(st => ({ playerIdx: (st.playerIdx || 0) + 1 })); },\n      onFinish: () => this.finishWorkout(pd),\n      onExit: () => set({ playing: false, playerIdx: 0 }),\n    };\n\n    // build library\n    const libraryVm = this.library.map(([name, focus]) => {\n      const added = s.selected.includes(name);\n      return {\n        name, focus,\n        added,\n        icon: added ? '\\u2713' : '+',\n        btnStyle: added\n          ? \"background:#d8fa4e;color:#13110a;font:800 17px 'Archivo';\"\n          : \"background:rgba(255,255,255,.07);color:#9b968b;font:600 19px 'Hanken Grotesque';\",\n        onToggle: () => this.setSelected(added ? s.selected.filter(x => x !== name) : [...s.selected, name]),\n      };\n    });\n    const selectedVm = s.selected.map((name, i) => ({\n      name, idx: i + 1, spec: this.specFor(name),\n      onRemove: () => this.setSelected(s.selected.filter(x => x !== name)),\n    }));\n\n    // ---- everything below is derived from the real workout log ----\n    const log = s.log || [];\n    const dayKey = (t) => { const x = new Date(t); return x.getFullYear() + '-' + (x.getMonth() + 1) + '-' + x.getDate(); };\n    const doneCount = {};\n    log.forEach(e => { const k = dayKey(e.ts); doneCount[k] = (doneCount[k] || 0) + 1; });\n    const doneSet = new Set(Object.keys(doneCount));\n\n    // streak (consecutive days ending today or yesterday)\n    let streak = 0;\n    { let dd = new Date(); if (!doneSet.has(dayKey(dd))) dd.setDate(dd.getDate() - 1);\n      while (doneSet.has(dayKey(dd))) { streak++; dd.setDate(dd.getDate() - 1); } }\n\n    const totalWorkouts = log.length;\n    const totalMinutes = log.reduce((a, e) => a + (e.mins || 0), 0);\n\n    // this week, Monday-first\n    const now = new Date();\n    const greeting = now.getHours() < 12 ? 'Good morning' : now.getHours() < 18 ? 'Good afternoon' : 'Good evening';\n    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n    const wdLong = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\n    const todayLabel = `${wdLong[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;\n    const dow = (now.getDay() + 6) % 7;\n    const monday = new Date(now); monday.setHours(0,0,0,0); monday.setDate(now.getDate() - dow);\n    const dayLabels = ['M','T','W','T','F','S','S'];\n    const weekData = []; let weekActive = 0;\n    for (let i = 0; i < 7; i++) {\n      const dd = new Date(monday); dd.setDate(monday.getDate() + i); const k = dayKey(dd);\n      const mins = log.filter(e => dayKey(e.ts) === k).reduce((a, e) => a + (e.mins || 0), 0);\n      weekActive += mins; weekData.push({ label: dayLabels[i], mins, done: doneSet.has(k) });\n    }\n    const maxMin = Math.max(30, ...weekData.map(w => w.mins));\n    const weekDots = weekData.map(w => ({ label: w.label, bar: w.done ? 'background:#d8fa4e;' : 'background:rgba(255,255,255,.1);' }));\n    const weekBars = weekData.map(w => ({\n      label: w.label,\n      style: w.mins === 0 ? 'height:5px;background:rgba(255,255,255,.08);'\n        : `height:${Math.round((w.mins / maxMin) * 78) + 8}px;background:linear-gradient(180deg,#d8fa4e,#a9c93a);`,\n    }));\n\n    // heatmap: last 35 days ending today\n    const heatColors = ['rgba(255,255,255,.06)','rgba(216,250,78,.3)','rgba(216,250,78,.6)','#d8fa4e'];\n    const heatStart = new Date(); heatStart.setHours(0,0,0,0); heatStart.setDate(heatStart.getDate() - 34);\n    const heatCells = [];\n    for (let i = 0; i < 35; i++) {\n      const dd = new Date(heatStart); dd.setDate(heatStart.getDate() + i);\n      const c = doneCount[dayKey(dd)] || 0; const v = c === 0 ? 0 : c === 1 ? 1 : c === 2 ? 2 : 3;\n      heatCells.push({ style: `background:${heatColors[v]};` });\n    }\n\n    // history (most recent first)\n    const fmt = (ts) => {\n      const d = new Date(ts); const t0 = new Date(); t0.setHours(0,0,0,0);\n      const d0 = new Date(d); d0.setHours(0,0,0,0);\n      const diff = Math.round((t0 - d0) / 86400000);\n      let day = diff === 0 ? 'Today' : diff === 1 ? 'Yesterday'\n        : diff < 7 ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]\n        : `${d.getMonth() + 1}/${d.getDate()}`;\n      let h = d.getHours(); const m = String(d.getMinutes()).padStart(2, '0');\n      const ap = h < 12 ? 'AM' : 'PM'; h = h % 12 || 12;\n      return `${day} · ${h}:${m} ${ap}`;\n    };\n    const history = log.slice(0, 12).map(e => ({ title: e.title, date: fmt(e.ts), mins: e.mins }));\n    const initials = ((s.name || 'A').trim().split(/\\s+/).slice(0, 2).map(w => w[0]).join('') || 'A').toUpperCase();\n\n    return {\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      isHome: s.tab === 'home', isTrain: s.tab === 'train', isProgress: s.tab === 'progress', isBuild: s.tab === 'build',\n      goHome: () => set({ tab:'home', detailId:null, playing:false }),\n      goTrain: () => set({ tab:'train', detailId:null, playing:false }),\n      goProgress: () => set({ tab:'progress', detailId:null, playing:false }),\n      goBuild: () => set({ tab:'build', detailId:null, playing:false }),\n      navHome: nc('home'), navTrain: nc('train'), navProgress: nc('progress'), navBuild: nc('build'),\n      openToday: () => set({ detailId:'core-crusher' }),\n      chips, workoutCards, quickPicks,\n      hasDetail: !!detail, detail,\n      isPlaying: s.playing, player,\n      routineName: s.routineName,\n      onName: (e) => { const v = e.target.value; set({ routineName: v }); this.save('homebody.routine', v); },\n      libraryVm, selectedVm,\n      selectedCount: s.selected.length,\n      hasSelected: s.selected.length > 0,\n      noSelected: s.selected.length === 0,\n      weekDots, weekBars, heatCells, history,\n      hasHistory: history.length > 0,\n      noHistory: history.length === 0,\n      name: s.name, initials, greeting, todayLabel,\n      clock: s.clock || (() => { const d=new Date(); let h=d.getHours()%12; if(h===0)h=12; return `${h}:${String(d.getMinutes()).padStart(2,'0')}`; })(),\n      onEditName: () => this.editName(),\n      streak, totalWorkouts, totalMinutes, weekActive,\n      hasVideo: !!s.videoEx,\n      video: s.videoEx ? {\n        name: s.videoEx,\n        verified: !!this.videos[s.videoEx],\n        notVerified: !this.videos[s.videoEx],\n        embedSrc: this.videos[s.videoEx]\n          ? `https://www.youtube-nocookie.com/embed/${this.videos[s.videoEx]}?rel=0`\n          : '',\n        cue: this.cues[s.videoEx] || 'Move slowly with control, keep your core braced, and breathe steadily throughout each rep.',\n        onOpenSearch: () => window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent('how to do ' + s.videoEx + ' exercise proper form')}`, '_blank', 'noopener'),\n        onClose: () => this.setState({ videoEx: null }),\n      } : null,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
